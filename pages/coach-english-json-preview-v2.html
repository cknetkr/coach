<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영어 JSON 샘플 미리보기 v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/coach-shared.css">
  <style>
    :root{
      --color-background-primary:rgba(15,23,42,0.82);
      --color-background-secondary:rgba(30,41,59,0.74);
      --color-background-info:rgba(8,47,73,0.36);
      --color-text-primary:#f8fafc;
      --color-text-secondary:#dbeafe;
      --color-text-tertiary:#93c5fd;
      --color-text-info:#bae6fd;
      --color-text-danger:#fdba74;
      --color-border-primary:rgba(125,211,252,0.34);
      --color-border-secondary:rgba(148,163,184,0.2);
      --color-border-tertiary:rgba(148,163,184,0.14);
      --border-radius-md:12px;
      --border-radius-lg:16px;
    }
    .preview-wrap{max-width:980px;margin:0 auto;padding:2rem 1.25rem 3rem}
    .preview-head{margin-bottom:1.2rem}
    .preview-kicker{font-size:.72rem;font-weight:800;letter-spacing:.08rem;text-transform:uppercase;color:#7dd3fc}
    .preview-title{margin-top:.4rem;font-size:2rem;font-weight:800;color:#fff}
    .preview-desc{margin-top:.65rem;font-size:.92rem;color:rgba(226,232,240,.78);line-height:1.75}
    .preview-status{margin-top:.9rem;padding:.7rem .85rem;border-radius:12px;border:1px solid rgba(56,189,248,.18);background:rgba(8,47,73,.22);color:#bae6fd;font-size:.82rem}
    .preview-surface{margin-top:1rem;background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(2,6,23,.88));border:1px solid rgba(125,211,252,.16);border-radius:22px;padding:22px 22px 10px;box-shadow:0 20px 60px rgba(2,8,23,.36);backdrop-filter:blur(8px)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    *{box-sizing:border-box;margin:0;padding:0}
    .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
    .tab{padding:7px 15px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);font-size:13px;cursor:pointer;background:rgba(15,23,42,.66);color:var(--color-text-secondary);transition:all .15s}
    .tab.active{background:rgba(56,189,248,.12);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500;box-shadow:0 0 0 1px rgba(56,189,248,.16) inset}
    .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-left:5px;vertical-align:middle}
    .blit{background:rgba(37,99,235,.18);color:#bfdbfe}.btoeic{background:rgba(56,189,248,.14);color:#bae6fd}.bopic{background:rgba(129,140,248,.18);color:#ddd6fe}.bvoca{background:rgba(249,115,22,.16);color:#fdba74}
    .panel{display:none}.panel.active{display:block}
    .sent{background:linear-gradient(180deg,rgba(30,41,59,.78),rgba(15,23,42,.78));border:1px solid rgba(56,189,248,.12);border-radius:var(--border-radius-lg);padding:15px 18px;margin-bottom:14px;font-size:15px;line-height:2;color:var(--color-text-primary)}
    .blank{display:inline-block;border-bottom:2px solid #38bdf8;min-width:50px;text-align:center;color:#7dd3fc;font-weight:700;padding:0 3px}
    .sec{border-top:.5px solid var(--color-border-tertiary);padding:12px 0}
    .sl{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px}
    .goal{background:var(--color-background-info);border:1px solid rgba(56,189,248,.16);border-radius:var(--border-radius-md);padding:10px 14px;font-size:13px;color:var(--color-text-info);line-height:1.6}
    .prow-basic{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:13px;color:var(--color-text-secondary)}
    .ptag{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary);white-space:nowrap;margin-top:1px;flex-shrink:0}
    .witem{display:flex;align-items:flex-start;gap:6px;font-size:13px;margin-bottom:5px;color:var(--color-text-secondary)}
    .wans{color:var(--color-text-danger);font-weight:500;margin-right:2px}
    .tip{border-left:3px solid #818cf8;padding:8px 12px;font-size:13px;color:var(--color-text-secondary);line-height:1.6;background:rgba(15,23,42,.44)}
    .mrow{display:flex;gap:8px;font-size:13px;margin-bottom:5px}
    .mlabel{color:var(--color-text-tertiary);min-width:84px;flex-shrink:0;padding-top:1px}
    .mval{color:var(--color-text-primary);line-height:1.6}
    .chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary);margin-right:5px;margin-bottom:4px}
    .pcard{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:10px;background:rgba(2,6,23,.28)}
    .pcard-header{padding:10px 14px;display:flex;align-items:center;gap:8px;background:rgba(15,23,42,.72)}
    .pword{font-size:15px;font-weight:500;color:var(--color-text-primary)}
    .ppos{font-size:11px;color:var(--color-text-tertiary);padding:2px 8px;background:rgba(15,23,42,.76);border-radius:20px;border:.5px solid var(--color-border-tertiary)}
    .pcard-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
    .prow{display:flex;gap:0;align-items:stretch;border-radius:var(--border-radius-md);overflow:hidden;border:.5px solid var(--color-border-tertiary)}
    .prow-label{width:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;padding:10px 6px;text-align:center;line-height:1.4}
    .label-know{background:rgba(56,189,248,.12);color:#bae6fd}.label-hear{background:rgba(249,115,22,.14);color:#fdba74}
    .prow-content{flex:1;padding:10px 12px;border-left:.5px solid var(--color-border-tertiary);background:rgba(15,23,42,.58);display:flex;flex-direction:column;gap:6px}
    .syllables{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
    .syl{display:inline-flex;align-items:center;justify-content:center;padding:4px 8px;border-radius:6px;font-size:13px;font-weight:500;line-height:1}
    .syl-stress{background:rgba(56,189,248,.16);color:#bae6fd;border:.5px solid rgba(125,211,252,.28)}
    .syl-weak{background:rgba(148,163,184,.14);color:#cbd5e1;border:.5px solid rgba(148,163,184,.2);font-size:11px;opacity:.85}
    .syl-merge{background:rgba(249,115,22,.16);color:#fdba74;border:.5px solid rgba(251,146,60,.28)}
    .syl-ghost{background:var(--color-background-secondary);color:var(--color-text-tertiary);border:.5px dashed var(--color-border-secondary);text-decoration:line-through;font-size:11px;opacity:.6}
    .syl-normal{background:rgba(30,41,59,.78);color:var(--color-text-primary);border:.5px solid var(--color-border-secondary)}
    .arrow{font-size:13px;color:var(--color-text-tertiary);margin:0 2px}
    .pdesc{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
    .hear-point{font-size:12px;color:#fdba74;line-height:1.6;padding:6px 10px;background:rgba(124,45,18,.26);border:1px solid rgba(251,146,60,.18);border-radius:var(--border-radius-md)}
    .tts-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .tts-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:rgba(15,23,42,.72);font-size:12px;cursor:pointer;color:var(--color-text-secondary);transition:all .15s;user-select:none}
    .tts-btn:hover{background:rgba(30,41,59,.82);border-color:var(--color-border-primary)}
    .tts-btn.playing{background:rgba(56,189,248,.16);border-color:rgba(125,211,252,.34);color:#e0f2fe}
    .tts-btn.slow{border-color:rgba(34,197,94,.28);color:#bbf7d0}
    .tts-btn.slow:hover{background:rgba(20,83,45,.28)}
    .tts-btn.slow.playing{background:rgba(22,101,52,.3);color:#dcfce7}
    .icon{width:13px;height:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .flow-box{background:rgba(15,23,42,.58);border:1px solid rgba(148,163,184,.12);border-radius:var(--border-radius-lg);padding:14px 16px}
    .flow{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:10px}
    .fw{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:6px;font-size:13px;font-weight:500}
    .fw-a{background:rgba(56,189,248,.16);color:#bae6fd;border:.5px solid rgba(125,211,252,.28)}
    .fw-b{background:rgba(129,140,248,.18);color:#ddd6fe;border:.5px solid rgba(165,180,252,.28)}
    .fw-c{background:rgba(34,197,94,.16);color:#bbf7d0;border:.5px solid rgba(74,222,128,.24)}
    .fw-d{background:rgba(249,115,22,.16);color:#fdba74;border:.5px solid rgba(251,146,60,.28)}
    .fw.subtle{font-size:11px;opacity:.8}
    .link-arrow{font-size:11px;color:var(--color-text-tertiary);margin:0 1px}
    .full-heard{margin-top:10px;font-size:13px;color:var(--color-text-secondary);line-height:1.7;padding:8px 12px;background:rgba(15,23,42,.78);border-radius:var(--border-radius-md);border:.5px solid var(--color-border-tertiary)}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .lg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
    .lg-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
    .lg-ghost{background:#64748b}
    .sc-item{margin-bottom:10px}
    .sc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:0}
    .sc-q{flex:1;font-size:13px;color:var(--color-text-secondary);line-height:1.6;padding-top:1px}
    .sc-btns{display:flex;gap:5px;flex-shrink:0}
    .sc-btn-no{font-size:11px;padding:4px 10px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:rgba(15,23,42,.72);color:var(--color-text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
    .sc-btn-no.open{background:rgba(124,45,18,.24);border-color:rgba(251,146,60,.24);color:#fdba74}
    .sc-btn-yes{font-size:11px;padding:4px 10px;border-radius:var(--border-radius-md);border:.5px solid rgba(34,197,94,.28);background:rgba(15,23,42,.72);color:#bbf7d0;cursor:pointer;transition:all .15s;white-space:nowrap}
    .sc-btn-yes.done{background:rgba(22,101,52,.28);border-color:rgba(74,222,128,.26);color:#dcfce7}
    .sc-sol{display:none;margin-top:8px;padding:10px 12px;background:rgba(15,23,42,.58);border-radius:var(--border-radius-md);border:.5px solid var(--color-border-tertiary)}
    .sc-sol.show{display:block}
    .sc-sol-label{font-size:11px;color:#fdba74;font-weight:500;margin-bottom:8px}
    .sc-sol-item{display:flex;gap:8px;font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;line-height:1.6}
    .sc-sol-num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:rgba(249,115,22,.22);color:#fdba74;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
    .sc-goal{margin-top:8px;padding:7px 10px;background:rgba(22,101,52,.24);border-radius:var(--border-radius-md);font-size:11px;color:#bbf7d0;line-height:1.5}
    .vcard{background:rgba(15,23,42,.78);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:10px}
    .vword{font-size:17px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
    .vpron{font-size:12px;color:var(--color-text-tertiary);margin-bottom:6px}
    .vmust{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(249,115,22,.16);color:#fdba74;font-weight:500;margin-bottom:8px}
    .vmeaning{font-size:13px;color:var(--color-text-secondary);margin-bottom:6px;line-height:1.6}
    .vex{font-size:12px;color:var(--color-text-tertiary);border-left:2px solid var(--color-border-secondary);padding-left:8px;line-height:1.6}
    .vsyn{font-size:12px;margin-top:6px;color:var(--color-text-tertiary)}
    .vsyn span{display:inline-block;background:var(--color-background-secondary);border-radius:20px;padding:2px 8px;margin-right:4px;font-size:11px;color:var(--color-text-secondary)}
    .vtoeic{font-size:11px;margin-top:6px;padding:5px 10px;background:rgba(8,47,73,.36);border-radius:var(--border-radius-md);color:var(--color-text-info)}
    .vopic{font-size:11px;margin-top:6px;padding:5px 10px;background:rgba(129,140,248,.18);border-radius:var(--border-radius-md);color:#ddd6fe}
    @media (max-width:760px){.preview-title{font-size:1.55rem}.preview-surface{padding:16px 14px 6px}.sc-top{flex-direction:column}.sc-btns{width:100%}.mrow{flex-direction:column;gap:2px}.mlabel{min-width:0}}
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <header class="page-header">
    <a href="../index.html" class="brand">코치<span>.</span></a>
    <nav class="nav-tabs">
      <a href="../index.html" class="nav-tab">🏠 홈</a>
      <a href="coach-english.html" class="nav-tab eng">🎧 영어</a>
    </nav>
  </header>
  <main class="preview-wrap">
    <section class="preview-head">
      <div class="preview-kicker">JSON Preview v2</div>
      <h1 class="preview-title">영어 받아쓰기 JSON 샘플 테스트</h1>
      <p class="preview-desc">레퍼런스 포맷과 같은 구조로 `s01.json`을 렌더링하는 미리보기입니다.</p>
      <div class="preview-status" id="json-preview-status">JSON 로딩 대기 중</div>
    </section>
    <section class="preview-surface">
      <div id="json-preview-root"></div>
    </section>
  </main>
  <script src="../assets/js/coach-english-json-preview-v2.js"></script>
</body>
</html>
