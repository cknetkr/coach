<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수행3 출력</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; background: #eef2f7; font-family: "Noto Sans KR", sans-serif; }
    .toolbar { max-width: 1200px; margin: 0 auto; padding: 16px; display: flex; justify-content: flex-end; gap: 10px; }
    .toolbar button { border: 1px solid #d1d5db; background: #fff; border-radius: 10px; padding: 10px 16px; font: inherit; font-weight: 700; cursor: pointer; }
    .pages { max-width: 1200px; margin: 0 auto 24px; display: grid; gap: 18px; }
    .page { background: #fff; border: 1px solid #d1d5db; border-radius: 12px; padding: 14px; box-sizing: border-box; }
    .grid-area { display: grid; grid-template-columns: 1fr 34px; gap: 8px; }
    .grid { display: grid; grid-template-columns: repeat(25, minmax(0, 1fr)); border-top: 1px solid #555; border-left: 1px solid #555; }
    .cell { aspect-ratio: 1 / 1; border-right: 1px solid #777; border-bottom: 1px solid #777; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .cell.empty { color: transparent; }
    .nums { display: grid; }
    .num { display: flex; align-items: center; justify-content: flex-start; font-size: 11px; color: #111; }
    .title { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #111; }
    @media print {
      @page { size: A4 landscape; margin: 6mm; }
      body { background: #fff; }
      .toolbar { display: none; }
      .pages { max-width: none; margin: 0; gap: 0; }
      .page { border: none; border-radius: 0; padding: 0; break-after: page; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" onclick="window.close()">닫기</button>
    <button type="button" onclick="window.print()">인쇄 / PDF 저장</button>
  </div>
  <div class="pages" id="pages"></div>
  <script>
    let payload = null;
    try { payload = JSON.parse(sessionStorage.getItem('coachPrint:sa3') || localStorage.getItem('coachPrint:sa3') || 'null'); } catch (e) {}
    const essay = (payload?.essay || '')
      .split(/\n{2,}/)
      .map(part => part.trim())
      .filter(Boolean)
      .map(part => ` ${part}`)
      .join('');
    const chars = [...essay];
    const pageSize = 600;
    const pages = Math.max(1, Math.ceil(chars.length / pageSize));
    const root = document.getElementById('pages');

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    function createCells(pageChars) {
      let html = '';
      for (let i = 0; i < pageSize; i++) {
        const ch = pageChars[i];
        html += `<div class="cell${!ch || ch === ' ' ? ' empty' : ''}">${ch ? escapeHtml(ch) : '&nbsp;'}</div>`;
      }
      return html;
    }

    function createNums(start) {
      let html = '';
      for (let row = 0; row < 24; row++) {
        html += `<div class="num">${start + row * 25}</div>`;
      }
      return html;
    }

    let html = '';
    for (let page = 0; page < pages; page++) {
      const pageChars = chars.slice(page * pageSize, (page + 1) * pageSize);
      html += `
        <section class="page">
          <div class="title">원고지 ${page + 1}장 · ${pageChars.length}/600자</div>
          <div class="grid-area">
            <div class="grid">${createCells(pageChars)}</div>
            <div class="nums">${createNums((page * pageSize) + 25)}</div>
          </div>
        </section>
      `;
    }
    root.innerHTML = html;
  </script>
</body>
</html>
